[[on-window-detected]]
if.app-id = 'com.brave.Browser'
if.window-title-regex-substring = 'FF | Admin'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
if.window-title-regex-substring = 'CP | Admin'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
if.window-title-regex-substring = 'A&O | Admin'
