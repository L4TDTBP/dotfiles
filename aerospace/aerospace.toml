[[on-window-detected]]
if.app-id = 'com.brave.Browser'
if.window-title-regex-substring = 'TVG | Admin'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
if.window-title-regex-substring = 'TVG | Poweruser'
